version: "2.2"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    volumes:
      # Persist runtime writes on the host
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      # Provide Laravel a real .env file inside the container (needed for key:generate).
      - ./.env:/var/www/html/.env
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    depends_on:
      - app
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=1", "--timeout=0"]
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    depends_on:
      - app
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    restart: unless-stopped
