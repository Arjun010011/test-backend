services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    volumes:
      # Persist runtime writes on the host
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      # Provide Laravel a real .env file inside the container (needed for key:generate).
      - ./.env:/var/www/html/.env
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      - app
    ports:
      - "80:80"
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    depends_on:
      - app
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=1", "--timeout=0"]
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    depends_on:
      - app
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    restart: unless-stopped
